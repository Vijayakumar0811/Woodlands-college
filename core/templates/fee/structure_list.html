{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Fee Structures</h3>
    <a href="{% url 'fee_structure_add' %}" class="btn btn-success mb-3">+ Add Structure</a>
    <table class="table table-bordered">
        <thead><tr><th>Course</th><th>Year</th><th>Section</th><th>Total Fee</th></tr></thead>
        <tbody>
            {% for fs in structures %}
            <tr>
                <td>{{ fs.course.name }}</td>
                <td>{{ fs.year }}</td>
                <td>{{ fs.section }}</td>
                <td>₹{{ fs.total_amount }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
