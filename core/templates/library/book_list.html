{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Books</h3>
    <a href="{% url 'book_add' %}" class="btn btn-success mb-3">+ Add Book</a>
    <table class="table table-bordered">
        <thead><tr><th>ISBN</th><th>Title</th><th>Author</th><th>Copies</th></tr></thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.isbn }}</td>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.copies }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
