{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Student List</h3>
    <form method="GET" class="mb-3">
        <div class="input-group">
            <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Search by name or roll no">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
    </form>
    <a href="{% url 'student_idcard' student.pk %}" class="btn btn-sm btn-info">ID Card</a>

    <a href="{% url 'student_add' %}" class="btn btn-success mb-3">+ Add Student</a>
    <table class="table table-bordered table-striped">
        <thead><tr>
            <th>Roll</th><th>Name</th><th>Course</th><th>Section</th><th>Actions</th>
        </tr></thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.roll_number }}</td>
                <td>{{ student.user.get_full_name }}</td>
                <td>{{ student.course }}</td>
                <td>{{ student.section }}</td>
                <td>
                    <a href="{% url 'student_edit' student.pk %}" class="btn btn-sm btn-primary">Edit</a>
                    <a href="{% url 'student_delete' student.pk %}" class="btn btn-sm btn-danger">Delete</a>
                    <a href="{% url 'student_promote' student.pk %}" class="btn btn-sm btn-warning">Promote</a>

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
