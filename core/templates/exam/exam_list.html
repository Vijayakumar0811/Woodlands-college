{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Exam List</h3>
    <a href="{% url 'exam_add' %}" class="btn btn-success mb-3">+ Add Exam</a>
    <table class="table table-bordered">
        <thead><tr><th>Name</th><th>Course</th><th>Year</th><th>Section</th><th>Actions</th></tr></thead>
        <tbody>
            {% for exam in exams %}
            <tr>
                <td>{{ exam.name }}</td>
                <td>{{ exam.course.name }}</td>
                <td>{{ exam.year }}</td>
                <td>{{ exam.section }}</td>
                <td><a href="{% url 'mark_entry' exam.id %}" class="btn btn-sm btn-primary">Enter Marks</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
