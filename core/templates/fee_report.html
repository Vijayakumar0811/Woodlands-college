{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h3>Fee Collection Report</h3>
  <a href="{% url 'export_fee_csv' %}" class="btn btn-outline-primary mb-3">⬇️ Export CSV</a>
  <table class="table table-striped">
    <thead><tr><th>Student</th><th>Total Paid</th><th>Total Due</th></tr></thead>
    <tbody>
      {% for row in data %}
      <tr>
        <td>{{ row.student__user__first_name }}</td>
        <td>{{ row.total_paid }}</td>
        <td>{{ row.total_due }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
