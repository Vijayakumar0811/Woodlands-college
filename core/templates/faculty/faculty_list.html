{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Faculty List</h3>
    <a href="{% url 'faculty_add' %}" class="btn btn-success mb-3">+ Add Faculty</a>
    <table class="table table-bordered table-striped">
        <thead><tr>
            <th>Name</th><th>Department</th><th>Designation</th><th>Actions</th>
        </tr></thead>
        <tbody>
            {% for f in faculty %}
            <tr>
                <td>{{ f.user.get_full_name }}</td>
                <td>{{ f.department }}</td>
                <td>{{ f.designation }}</td>
                <td>
                    <a href="{% url 'faculty_edit' f.pk %}" class="btn btn-sm btn-primary">Edit</a>
                    <a href="{% url 'faculty_delete' f.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
