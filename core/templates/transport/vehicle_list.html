{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Transport Vehicles</h3>
    <a href="{% url 'vehicle_add' %}" class="btn btn-success mb-3">+ Add Vehicle</a>
    <table class="table">
        <thead><tr><th>Number</th><th>Route</th><th>Driver</th><th>Capacity</th></tr></thead>
        <tbody>
            {% for v in vehicles %}
            <tr>
                <td>{{ v.number_plate }}</td>
                <td>{{ v.route }}</td>
                <td>{{ v.driver_name }}</td>
                <td>{{ v.capacity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
