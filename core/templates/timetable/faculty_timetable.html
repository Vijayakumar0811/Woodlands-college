{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3>My Timetable</h3>
    <table class="table table-striped">
        <thead><tr><th>Day</th><th>Period</th><th>Subject</th><th>Room</th></tr></thead>
        <tbody>
            {% for entry in entries %}
            <tr>
                <td>{{ entry.day }}</td>
                <td>{{ entry.period }}</td>
                <td>{{ entry.subject.name }}</td>
                <td>{{ entry.room_no }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
