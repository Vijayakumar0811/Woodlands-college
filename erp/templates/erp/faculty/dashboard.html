<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Faculty Dashboard</a>
        <div class="d-flex">
            <a class="btn btn-outline-light" href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Mark Attendance</h5>
                    <p class="card-text">Record daily attendance for students.</p>
                    <a href="{% url 'attendance_view' %}" class="btn btn-primary">Mark</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Upload Results</h5>
                    <p class="card-text">Enter or update student results.</p>
                    <a href="#" class="btn btn-primary">Upload</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
